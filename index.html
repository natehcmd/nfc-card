<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nate Howard — JOV AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      font-family: 'Montserrat', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Card image — full width, natural aspect ratio */
    .card-img {
      width: 100%;
      border-radius: 14px;
      display: block;
      box-shadow:
        0 0 0 1px #2a2a2a,
        0 24px 60px rgba(0,0,0,0.8);
    }

    /* Save button */
    .save-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7a5500 0%, #c9950a 30%, #e8c050 55%, #c9950a 75%, #7a5500 100%);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #111;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s;
      box-shadow: 0 4px 24px rgba(201,149,10,0.3);
    }
    .save-btn:hover  { filter: brightness(1.12); transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0);  filter: brightness(0.95); }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="card-img" src="card.png" alt="Nate Howard — JOV AI" />
    <button class="save-btn" onclick="saveContact()">Save Contact</button>
  </div>

  <script>
    function saveContact() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Nate Howard',
        'N:Howard;Nate;;;',
        'ORG:JOV AI',
        'TITLE:AI Consultant',
        'TEL;TYPE=CELL:+14699940010',
        'EMAIL;TYPE=WORK:nate@jov.ai',
        'URL:https://jov.ai',
        'X-SOCIALPROFILE;type=linkedin:https://www.linkedin.com/in/Nate-P-Howard',
        'END:VCARD'
      ].join('\r\n');
      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'Nate-Howard.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
