<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nate Howard — JOV AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 32px;
      font-family: 'Montserrat', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 400px;
      background: #1c1c1c;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px #2e2e2e,
        0 32px 80px rgba(0,0,0,0.85);
    }

    /* ── Network corner SVGs ── */
    .net {
      position: absolute;
      width: 180px;
      height: 180px;
      pointer-events: none;
      opacity: 0.5;
    }
    .net-tl { top: 0; left: 0; }
    .net-tr { top: 0; right: 0; transform: scaleX(-1); }
    .net-bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .net-br { bottom: 0; right: 0; transform: scale(-1); }

    /* ── Card body ── */
    .body {
      position: relative;
      z-index: 1;
      padding: 44px 32px 38px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Logo ── */
    .logo {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: 0.14em;
      line-height: 1;
      margin-bottom: 18px;
    }
    .logo .jov {
      background: linear-gradient(170deg, #8a6010 0%, #c9950a 18%, #e8c050 38%, #fff0a0 50%, #e8c050 62%, #c9950a 80%, #7a5500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo .a-part {
      background: linear-gradient(170deg, #8a6010 0%, #c9950a 18%, #e8c050 38%, #fff0a0 50%, #e8c050 62%, #c9950a 80%, #7a5500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo .i-part {
      background: linear-gradient(170deg, #444 0%, #888 20%, #ccc 40%, #eee 50%, #ccc 62%, #888 80%, #444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
    }

    /* ── Gold rule ── */
    .rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #9a7520 15%, #d4a030 35%, #e8c050 50%, #d4a030 65%, #9a7520 85%, transparent 100%);
      margin-bottom: 22px;
    }

    /* ── Name & Title ── */
    .name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #d4a030;
      text-align: center;
      margin-bottom: 6px;
    }
    .title {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #999;
      text-align: center;
      margin-bottom: 32px;
    }

    /* ── Contact block ── */
    .contact-block {
      width: 100%;
      padding-left: 12px;
      margin-bottom: 32px;
    }
    .company {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #c9950a;
      margin-bottom: 12px;
    }
    .contact-row {
      display: flex;
      align-items: baseline;
      gap: 0;
      text-decoration: none;
      color: inherit;
      margin-bottom: 7px;
    }
    .contact-row:last-child { margin-bottom: 0; }
    .lbl {
      font-size: 12px;
      font-weight: 600;
      color: #bbb;
      min-width: 28px;
      letter-spacing: 0.05em;
    }
    .val {
      font-size: 12px;
      font-weight: 300;
      color: #ccc;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }
    .contact-row:hover .val { color: #e8c050; }

    /* ── Save button ── */
    .save-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #7a5500 0%, #c9950a 30%, #e8c050 55%, #c9950a 75%, #7a5500 100%);
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1c1c1c;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s;
      box-shadow: 0 4px 24px rgba(201,149,10,0.3);
    }
    .save-btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); filter: brightness(0.95); }
  </style>
</head>

  <script>
    function saveContact() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Nate Howard',
        'N:Howard;Nate;;;',
        'ORG:JOV AI',
        'TITLE:AI Consultant',
        'TEL;TYPE=CELL:+14699940010',
        'EMAIL;TYPE=WORK:nate@jov.ai',
        'URL:https://jov.ai',
        'X-SOCIALPROFILE;type=linkedin:https://www.linkedin.com/in/Nate-P-Howard',
        'END:VCARD'
      ].join('\r\n');
      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Nate-Howard.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
