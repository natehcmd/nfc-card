<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nate Howard — JOV AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: radial-gradient(ellipse at center, #1c1c1c 0%, #090909 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      font-family: 'Montserrat', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    .scene {
      perspective: 1000px;
      cursor: grab;
    }
    .scene.dragging { cursor: grabbing; }

    .card-3d {
      position: relative;
      width: min(86vw, 460px);
      aspect-ratio: 1.75;
      border-radius: 12px;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .card-3d img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      pointer-events: none;
      /* fix rounded corners on 3d-transformed elements */
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      mask-image: radial-gradient(white, black);
    }

    /* moving specular shine */
    .shine {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      pointer-events: none;
      background: radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.15) 0%, transparent 60%);
      mix-blend-mode: screen;
    }

    /* drag-over state */
    .card-3d.drag-over::after {
      content: 'Drop to update image';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: rgba(201,149,10,0.22);
      border: 2px dashed #e8c050;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #e8c050;
      text-transform: uppercase;
    }

    .save-btn {
      width: min(86vw, 460px);
      padding: 15px;
      border: none;
      border-radius: 11px;
      background: linear-gradient(135deg, #7a5500 0%, #c9950a 30%, #e8c050 55%, #c9950a 75%, #7a5500 100%);
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #111;
      cursor: pointer;
      box-shadow: 0 4px 28px rgba(201,149,10,0.3);
      transition: filter 0.2s, transform 0.15s;
    }
    .save-btn:hover  { filter: brightness(1.1); transform: translateY(-2px); }
    .save-btn:active { transform: translateY(0); filter: brightness(0.95); }

    .hint {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: #2e2e2e;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="scene" id="scene">
    <div class="card-3d" id="card">
      <img id="cardImg" src="card.png" alt="Nate Howard — JOV AI" />
      <div class="shine" id="shine"></div>
    </div>
  </div>

  <button class="save-btn" onclick="saveContact()">Save Contact</button>
  <div class="hint">Drag to spin &nbsp;·&nbsp; Drop image to update</div>

  <script>
    const scene = document.getElementById('scene');
    const card  = document.getElementById('card');
    const shine = document.getElementById('shine');
    const img   = document.getElementById('cardImg');

    let rotX = 5, rotY = -10;
    let dragging = false;
    let lastX, lastY;
    let velX = 0, velY = 0;
    let rafId;

    function applyTransform() {
      card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
      const sx = 50 - rotY * 1.5;
      const sy = 50 + rotX * 1.5;
      shine.style.background = `radial-gradient(ellipse at ${sx}% ${sy}%, rgba(255,255,255,0.15) 0%, transparent 60%)`;
    }

    // pointer events (works for mouse + touch)
    scene.addEventListener('pointerdown', e => {
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
      velX = velY = 0;
      scene.classList.add('dragging');
      cancelAnimationFrame(rafId);
      e.preventDefault();
    });

    window.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      velX = dx;
      velY = dy;
      rotY = Math.max(-45, Math.min(45, rotY + dx * 0.4));
      rotX = Math.max(-30, Math.min(30, rotX - dy * 0.4));
      applyTransform();
    });

    window.addEventListener('pointerup', () => {
      if (!dragging) return;
      dragging = false;
      scene.classList.remove('dragging');
      coast();
    });

    // momentum coast after release
    function coast() {
      if (Math.abs(velX) < 0.2 && Math.abs(velY) < 0.2) return;
      velX *= 0.92;
      velY *= 0.92;
      rotY = Math.max(-45, Math.min(45, rotY + velX * 0.4));
      rotX = Math.max(-30, Math.min(30, rotX - velY * 0.4));
      applyTransform();
      rafId = requestAnimationFrame(coast);
    }

    applyTransform();

    // drag-and-drop image swap
    ['dragenter','dragover'].forEach(evt =>
      card.addEventListener(evt, e => { e.preventDefault(); card.classList.add('drag-over'); })
    );
    ['dragleave','dragend'].forEach(evt =>
      card.addEventListener(evt, () => card.classList.remove('drag-over'))
    );
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = ev => { img.src = ev.target.result; };
        reader.readAsDataURL(file);
      }
    });
