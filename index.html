<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nate Howard — JOV AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A03F;
      --gold-light: #E8C96A;
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* subtle node network background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(201,160,63,0.06) 0%, transparent 50%),
        radial-gradient(circle at 85% 80%, rgba(201,160,63,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.18em;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, #a07c30 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom: 28px;
      opacity: 0.5;
    }

    .name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #f5f5f5;
      text-align: center;
      margin-bottom: 6px;
    }

    .title {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 32px;
    }

    .contacts {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 36px;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      transition: color 0.2s;
    }

    .contact-row:hover .contact-label { color: var(--gold-light); }
    .contact-row:hover .icon { color: var(--gold-light); }

    .icon {
      width: 18px;
      height: 18px;
      color: var(--gold);
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .contact-label {
      font-size: 14px;
      font-weight: 400;
      color: #ccc;
      transition: color 0.2s;
    }

    .save-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0d0d0d;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .save-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); opacity: 1; }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #444;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo">JOV AI</div>
      <div class="divider"></div>

      <div class="name">Nate Howard</div>
      <div class="title">AI Consultant</div>

      <div class="contacts">
        <a class="contact-row" href="tel:+14699940010">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.68 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.05 6.05l1.32-1.32a2 2 0 0 1 2.11-.45c.91.32 1.85.55 2.81.68A2 2 0 0 1 22 16.92z"/>
          </svg>
          <span class="contact-label">469.994.0010</span>
        </a>

        <a class="contact-row" href="mailto:nate@jov.ai">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <span class="contact-label">nate@jov.ai</span>
        </a>

        <a class="contact-row" href="https://jov.ai" target="_blank" rel="noopener">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a14.5 14.5 0 0 1 0 20 14.5 14.5 0 0 1 0-20"/>
            <path d="M2 12h20"/>
          </svg>
          <span class="contact-label">jov.ai</span>
        </a>

        <a class="contact-row" href="https://www.linkedin.com/in/Nate-P-Howard" target="_blank" rel="noopener">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
          <span class="contact-label">linkedin.com/in/Nate-P-Howard</span>
        </a>
      </div>

      <button class="save-btn" onclick="saveContact()">Save Contact</button>

      <div class="footer">JOV AI — jov.ai</div>
    </div>
  </div>

  <script>
    function saveContact() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Nate Howard',
        'N:Howard;Nate;;;',
        'ORG:JOV AI',
        'TITLE:AI Consultant',
        'TEL;TYPE=CELL:+14699940010',
        'EMAIL;TYPE=WORK:nate@jov.ai',
        'URL:https://jov.ai',
        'X-SOCIALPROFILE;type=linkedin:https://www.linkedin.com/in/Nate-P-Howard',
        'END:VCARD'
      ].join('\r\n');

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Nate-Howard.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
