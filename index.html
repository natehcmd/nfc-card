<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nate Howard — JOV AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: #111;
      border-radius: 18px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px #2a2a2a,
        0 30px 80px rgba(0,0,0,0.8),
        0 0 60px rgba(201,160,63,0.06);
    }

    /* Network SVG background */
    .network-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.35;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      padding: 44px 36px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 20px;
    }

    .logo-text {
      font-family: 'Cinzel', serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 0.22em;
      background: linear-gradient(
        160deg,
        #8a6820 0%,
        #C9A03F 20%,
        #E8C96A 40%,
        #f5e09a 50%,
        #E8C96A 60%,
        #C9A03F 75%,
        #8a6820 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      line-height: 1;
    }

    .logo-text .jov { display: inline; }
    .logo-text .ai-part {
      background: linear-gradient(
        160deg,
        #5a5a6a 0%,
        #9090a8 20%,
        #c8c8d8 40%,
        #e8e8f0 50%,
        #c8c8d8 60%,
        #9090a8 75%,
        #5a5a6a 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.22em;
    }

    .divider {
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,160,63,0.7), transparent);
      margin: 20px 0 24px;
    }

    /* ── Identity ── */
    .name {
      font-family: 'Cinzel', serif;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: #d4a843;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
    }

    .title {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #aaa;
      text-align: center;
      margin-bottom: 36px;
    }

    /* ── Contacts ── */
    .contacts {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 13px;
      margin-bottom: 34px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }
    .row:hover { opacity: 0.75; }

    .row-label-group {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .row-key {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #C9A03F;
      min-width: 18px;
    }

    .row-val {
      font-size: 13px;
      font-weight: 300;
      color: #ccc;
      letter-spacing: 0.02em;
    }

    /* ── Save Button ── */
    .save-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #9a7520 0%, #C9A03F 35%, #E8C96A 60%, #C9A03F 80%, #9a7520 100%);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #0d0d0d;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(201,160,63,0.25);
    }
    .save-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); filter: brightness(0.95); }

    .card-footer {
      margin-top: 18px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #3a3a3a;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Network node pattern -->
    <svg class="network-bg" viewBox="0 0 420 580" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#C9A03F" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#C9A03F" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- top-left cluster -->
      <line x1="0" y1="60" x2="60" y2="20" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="60" y1="20" x2="110" y2="70" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="110" y1="70" x2="60" y2="110" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="60" y1="20" x2="40" y2="90" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="0" y1="60" x2="40" y2="90" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="40" y1="90" x2="110" y2="70" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="60" y1="110" x2="0" y2="140" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="110" y1="70" x2="150" y2="30" stroke="#C9A03F" stroke-width="0.5"/>
      <circle cx="0" cy="60" r="2.5" fill="#C9A03F" opacity="0.6"/>
      <circle cx="60" cy="20" r="2.5" fill="#C9A03F" opacity="0.6"/>
      <circle cx="110" cy="70" r="2" fill="#C9A03F" opacity="0.5"/>
      <circle cx="40" cy="90" r="2" fill="#C9A03F" opacity="0.4"/>
      <circle cx="60" cy="110" r="2" fill="#C9A03F" opacity="0.4"/>
      <circle cx="150" cy="30" r="2" fill="#C9A03F" opacity="0.3"/>
      <!-- top-right cluster -->
      <line x1="420" y1="40" x2="370" y2="80" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="370" y1="80" x2="320" y2="50" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="320" y1="50" x2="370" y2="10" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="370" y1="10" x2="420" y2="40" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="370" y1="80" x2="340" y2="130" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="320" y1="50" x2="280" y2="90" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="280" y1="90" x2="340" y2="130" stroke="#C9A03F" stroke-width="0.5"/>
      <circle cx="420" cy="40" r="2.5" fill="#C9A03F" opacity="0.6"/>
      <circle cx="370" cy="80" r="2.5" fill="#C9A03F" opacity="0.6"/>
      <circle cx="320" cy="50" r="2" fill="#C9A03F" opacity="0.5"/>
      <circle cx="370" cy="10" r="2" fill="#C9A03F" opacity="0.4"/>
      <circle cx="340" cy="130" r="2" fill="#C9A03F" opacity="0.4"/>
      <circle cx="280" cy="90" r="2" fill="#C9A03F" opacity="0.3"/>
      <!-- bottom-right cluster -->
      <line x1="420" y1="520" x2="370" y2="490" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="370" y1="490" x2="330" y2="545" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="330" y1="545" x2="390" y2="570" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="370" y1="490" x2="310" y2="470" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="310" y1="470" x2="280" y2="520" stroke="#C9A03F" stroke-width="0.5"/>
      <circle cx="420" cy="520" r="2.5" fill="#C9A03F" opacity="0.5"/>
      <circle cx="370" cy="490" r="2" fill="#C9A03F" opacity="0.4"/>
      <circle cx="330" cy="545" r="2" fill="#C9A03F" opacity="0.4"/>
      <circle cx="310" cy="470" r="2" fill="#C9A03F" opacity="0.3"/>
      <!-- bottom-left cluster -->
      <line x1="0" y1="500" x2="50" y2="470" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="50" y1="470" x2="90" y2="520" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="90" y1="520" x2="40" y2="555" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="40" y1="555" x2="0" y2="500" stroke="#C9A03F" stroke-width="0.5"/>
      <line x1="50" y1="470" x2="110" y2="455" stroke="#C9A03F" stroke-width="0.5"/>
      <circle cx="0" cy="500" r="2.5" fill="#C9A03F" opacity="0.5"/>
      <circle cx="50" cy="470" r="2" fill="#C9A03F" opacity="0.4"/>
      <circle cx="90" cy="520" r="2" fill="#C9A03F" opacity="0.4"/>
      <circle cx="110" cy="455" r="2" fill="#C9A03F" opacity="0.3"/>
    </svg>

    <div class="card-inner">
      <div class="logo-wrap">
        <span class="logo-text">
          <span class="jov">JOV</span><span class="ai-part">Ai</span>
        </span>
      </div>

      <div class="divider"></div>

      <div class="name">Nate Howard</div>
      <div class="title">AI Consultant</div>

      <div class="contacts">
        <a class="row" href="tel:+14699940010">
          <span class="row-key">T</span>
          <span class="row-val">469.994.0010</span>
        </a>
        <a class="row" href="mailto:nate@jov.ai">
          <span class="row-key">E</span>
          <span class="row-val">nate@jov.ai</span>
        </a>
        <a class="row" href="https://jov.ai" target="_blank" rel="noopener">
          <span class="row-key">W</span>
          <span class="row-val">jov.ai</span>
        </a>
        <a class="row" href="https://www.linkedin.com/in/Nate-P-Howard" target="_blank" rel="noopener">
          <span class="row-key">Li</span>
          <span class="row-val">linkedin.com/in/Nate-P-Howard</span>
        </a>
      </div>

      <button class="save-btn" onclick="saveContact()">Save Contact</button>

      <div class="card-footer">JOV AI &mdash; jov.ai</div>
    </div>
  </div>

  <script>
    function saveContact() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Nate Howard',
        'N:Howard;Nate;;;',
        'ORG:JOV AI',
        'TITLE:AI Consultant',
        'TEL;TYPE=CELL:+14699940010',
        'EMAIL;TYPE=WORK:nate@jov.ai',
        'URL:https://jov.ai',
        'X-SOCIALPROFILE;type=linkedin:https://www.linkedin.com/in/Nate-P-Howard',
        'END:VCARD'
      ].join('\r\n');

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Nate-Howard.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
